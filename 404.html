
 <style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    font-family:Segoe UI,Arial,sans-serif;
    color:white;
}

/* spotlight */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:300px;
    background:radial-gradient(circle,
        rgba(255,255,255,.25),
        transparent 70%);
    filter:blur(40px);
}

.container{
    text-align:center;
    position:relative;
}

h1{
    margin:0;
    font-size:220px;
    line-height:1;
    font-weight:900;

    background:linear-gradient(
        to bottom,
        #ffffff 0%,
        #888 20%,
        #111 55%,
        #000 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 2px #fff,
        0 0 20px rgba(255,255,255,.2);
}

.reflection{
    font-size:220px;
    font-weight:900;
    transform:scaleY(-1);
    opacity:.12;
    margin-top:-40px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,.4),
        transparent
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

h2{
    margin-top:-100px;
    font-size:48px;
    font-weight:300;
    color:#d0d0d0;
}

p{
    color:#999;
    font-size:20px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:18px 45px;
    text-decoration:none;
    color:white;
    border-radius:18px;

    background:
        linear-gradient(
            to bottom,
            #666 0%,
            #222 45%,
            #000 100%
        );

    border:1px solid #777;

    box-shadow:
        inset 0 2px 0 rgba(255,255,255,.5),
        0 0 25px rgba(255,255,255,.15);
}

.btn:hover{
    box-shadow:
        inset 0 2px 0 rgba(255,255,255,.8),
        0 0 40px rgba(255,255,255,.3);
}
</style>
</head>
<body>
<div class="container">
    <h1>404</h1>
    <div class="reflection">404</div>

    <h2>Stránka nebyla nalezena</h2>

    <p>
        Omlouváme se, ale požadovaná stránka neexistuje
        nebo byla přesunuta.
    </p>

    <a href="/" class="btn">ZPĚT NA HLAVNÍ STRÁNKU</a>
</div>
